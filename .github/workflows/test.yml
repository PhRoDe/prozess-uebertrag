name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        env:
          ANTHROPIC_API_KEY: "ci-dummy-key"
          SUPABASE_URL: "https://ci.example.com"
          SUPABASE_SERVICE_KEY: "ci-dummy-key"
          APP_PASSWORD_HASH: "ci-dummy-hash"
          SESSION_SECRET: "ci-dummy-secret"
        run: pytest -q
      - name: Verify Regel-Enforcement-Test in der Suite
        run: |
          if ! pytest --collect-only -q tests/test_excel_builder.py | \
              grep -q "test_alle_gruppen_sum_zellen_sind_formeln_kein_hardcoded_wert"; then
            echo "Regel-Enforcement-Test fehlt"
            exit 1
          fi
