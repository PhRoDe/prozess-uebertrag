<div id="job-state"
     hx-get="/job/{{ job.id }}/status"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
  <div class="bg-white rounded-lg shadow-sm border p-8">
    <div class="flex items-center mb-4">
      <svg class="spinner h-5 w-5 text-blue-600 mr-3" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <h2 class="text-xl font-semibold">{{ status_label }}</h2>
    </div>
    <p class="text-xs text-slate-500">Bitte das Fenster offen lassen, bis die Verarbeitung fertig ist.</p>
  </div>
</div>
