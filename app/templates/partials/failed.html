<div id="job-state" class="bg-white rounded-lg shadow-sm border border-red-200 p-8 text-center">
  <svg class="mx-auto h-16 w-16 text-red-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
  </svg>
  <h2 class="text-xl font-semibold mb-2">Verarbeitung fehlgeschlagen</h2>
  {% if job.error_message %}
    <p class="text-slate-600 mb-6">{{ job.error_message }}</p>
  {% endif %}
  <a href="/" class="text-sm text-slate-600 hover:text-slate-900 underline">Neue Verarbeitung starten</a>
</div>
